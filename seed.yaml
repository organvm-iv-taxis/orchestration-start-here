- type: audit_reports
  description: System-wide organ health audits and promotion readiness reports.
- type: campaign_data
  description: Income-weighted open-source contribution campaign state (UNBLOCK->ENGAGE->CULTIVATE->HARVEST->INJECT).
- type: outreach_data
  description: Relationship lifecycle tracking with scored engagement events.
- type: backflow_data
  description: Knowledge routing pipeline to 6 organs (theory/generative/code/narrative/community/distribution).
- type: testament_formalization
  description: 13-article codified writing rules formalized into logic, algorithms, and math.
- type: absorption_data
  description: Detected expansion-worthy questions from external conversations via 8 heuristics.
- type: fieldwork_data
  description: Process observations from contribution workflows, append-only stream with spectrum scoring.
- type: action_ledger_data
  description: System-wide process recording — semantic actions, parameter trajectories, cycle detection.
- type: threshold_topology
  description: 2D governance membrane model (UMFAS scopes × Atomic Clock depths) — 16 threshold cells with permeability attenuation, 32 classified rules, executable validator.
consumes:
- type: github_pr_states
